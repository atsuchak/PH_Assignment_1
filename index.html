<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevConf 2026</title>

    <!-- Font style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Header section -->
    <header>
        <nav>
            <div class="logo">
                <img src="./assets/logo.png" alt="Logo image">
            </div>
            <div class="nav-list">
                <ul>
                    <li>Speakers</li>
                    <li>Schedule</li>
                    <li>Tracks</li>
                    <li>Venue</li>
                    <li>Blog</li>
                </ul>
            </div>
            <button class="btn">Register Now</button>
        </nav>
    </header>

    <!-- Hero section -->
    <section class="hero">
        <div class="hero-top">
            <h1>Code. <span>Connect</span>. Create</h1>
            <p>Join 4,000+ engineers, founders, and builders at the premier developer conference of 2026. Three days of cutting-edge talks, hands-on workshops, and meaningful connections.</p>
        </div>
        <div class="hero-bottom">
            <button class="btn">Resigter Now</button>
        </div>
    </section>

    <!-- Speaker section -->
    <section class="Speaker">
        
    </section>
